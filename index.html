<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNS 피드 생성기</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<style>
    :root {
        --primary-text: #222;
        --secondary-text: #888;
        --accent-color: #0095f6;
        --controls-bg: #fff;
        --border-radius: 12px;
    }

    body { 
        font-family: 'Pretendard', -apple-system, sans-serif; 
        margin: 0; padding: 30px; 
        display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; 
        background-color: #fafafa;
        color: var(--primary-text);
    }
    
    .main-container { display: flex; gap: 40px; flex-wrap: wrap; justify-content: center; align-items: flex-start; width: 100%; max-width: 1000px; }

    /* 컨트롤 패널 */
    .controls { background: var(--controls-bg); padding: 30px; border-radius: var(--border-radius); box-shadow: 0 8px 30px rgba(0,0,0,0.05); width: 340px; position: sticky; top: 30px; }
    .controls h3 { margin-top: 0; text-align: center; margin-bottom: 25px;}
    .control-group { margin-bottom: 20px; }
    .controls label { display: block; font-size: 0.95rem; font-weight: 600; color: #444; margin-bottom: 8px;}
    .controls input, .controls textarea { width: 100%; padding: 14px; border: 1px solid #e0e0e0; border-radius: 8px; box-sizing: border-box; transition: 0.2s; font-family: inherit; }
    .controls input:focus, .controls textarea:focus { border-color: #ccc; outline: none; box-shadow: 0 0 0 3px rgba(0,0,0,0.05); }
    .controls input[type="file"] { border: none; padding: 0; margin-top: 5px; cursor: pointer; }
    
    /* 댓글 입력 */
    .comment-input-group { display: flex; gap: 12px; margin-top: 8px; }
    .comment-input-group input { flex: 1; }
    .add-comment-btn { background: #333; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    .comment-list-control { margin-top: 15px; font-size: 0.9rem; color: var(--secondary-text);}
    
    .comment-control-item { display: flex; justify-content: space-between; align-items: flex-start; padding: 10px 0; border-bottom: 1px solid #eee; }
    .cmt-text-area { flex: 1; padding-right: 10px; word-break: break-all; line-height: 1.5; }
    .comment-control-item button { background: none; border: none; cursor: pointer; font-size: 0.9rem; margin-top: 2px; }
    .comment-control-item .del-btn { color: #f44; }

    /* 액션 버튼 */
    .action-buttons { display: flex; flex-direction: column; gap: 12px; margin-top: 30px; }
    .action-btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 1rem; }
    .capture-btn { background: #222; color: white; }
    .copy-btn { background: #fff; color: #222; border: 1px solid #222;}
    .share-btn { background: var(--accent-color); color: white; }

    /* 안팎 공통 직접 수정 가능 영역 강조 효과 */
    .editable { 
        outline: none; border-radius: 4px; padding: 2px 4px; margin: -2px -4px; 
        border: 1px dashed transparent; transition: 0.2s; 
    }
    .editable:hover { border-color: #ccc; background: rgba(0,0,0,0.03); cursor: text; }
    .editable:focus { border-color: var(--accent-color); background: #fff; box-shadow: 0 0 0 2px rgba(0,149,246,0.2); cursor: text; }

    /* 피드 카드 미리보기 */
    .capture-container { display: flex; justify-content: center; align-items: flex-start; overflow: visible; position: relative; }

    .feed-card { 
        background: #ffffff; 
        border-radius: var(--border-radius); width: 380px; 
        box-shadow: 0 15px 45px rgba(0,0,0,0.08); overflow: hidden; 
        border: 1px solid rgba(0,0,0,0.05);
        transition: transform 0.3s ease-out;
        transform-origin: top center;
    }
    .card-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 18px; border-bottom: 1px solid #eee; }
    .user-info { display: flex; align-items: center; gap: 12px; }
    
    .user-avatar { 
        width: 36px; height: 36px; border-radius: 50%; background-color: #eee; 
        background-size: cover; background-position: center; background-repeat: no-repeat;
        display: flex; justify-content: center; align-items: center; 
    }
    .avatar-placeholder { font-size: 1.8rem; color: #ccc; }
    .username-display { font-weight: 600; font-size: 0.95rem; color: #222; }
    
    .post-image-container { 
        width: 100%; aspect-ratio: 1/1; background-color: #f0f0f0; 
        background-size: cover; background-position: center; background-repeat: no-repeat;
        display: flex; justify-content: center; align-items: center; position: relative; 
    }
    .post-image-container .fa-camera { font-size: 5rem; color: rgba(0,0,0,0.05); }
    
    .post-actions { padding: 12px 18px; display: flex; justify-content: space-between; font-size: 1.5rem; color: #333; }
    .post-actions .left { display: flex; gap: 15px; }
    
    .post-content { padding: 0 18px 18px; font-size: 0.9rem; color: #222; }
    .post-caption { margin-bottom: 8px; }
    .post-caption strong { font-weight: 600; margin-right: 6px;}
    
    .caption-text b { font-weight: 600; }
    .hashtag { color: var(--accent-color); font-weight: inherit; }
    
    .view-comments-btn { color: var(--secondary-text); margin-bottom: 8px; font-size: 0.85rem; cursor: pointer; display: none; }
    .comments-section { display: flex; flex-direction: column; gap: 6px; }
    .comment-item { display: flex; justify-content: space-between; align-items: flex-start; font-size: 0.85rem;}
    .comment-item div { display: flex; gap: 6px; align-items: flex-start;}
    .comment-item strong { font-weight: 600; white-space: nowrap;}
    .comment-item .comment-text { color: #444; word-break: break-all; }
    .comment-item .fa-heart { color: #ccc; font-size: 0.75rem; margin-top: 4px; cursor: pointer;}
    
    @media (max-width: 420px) {
        .main-container { flex-direction: column; gap: 20px; align-items: center; }
        .controls { width: 100%; position: static; box-sizing: border-box; }
        .capture-container { width: 100%; justify-content: center; }
        .feed-card { width: 380px; }
    }
</style>
</head>
<body>

<div class="main-container">
    <div class="controls">
        <h3>⚙️ SNS 피드 생성기</h3>
        <div class="control-group">
            <label>유저 이름</label>
            <input type="text" id="inputUsername" value="WHOU_Design" oninput="updateFeedText()">
        </div>
        <div class="control-group">
            <label>유저 사진</label>
            <input type="file" accept="image/*" onchange="previewImage(this, 'outProfilePicArea', 'profilePlaceholder')">
        </div>
        <div class="control-group">
            <label>메인 사진</label>
            <input type="file" accept="image/*" onchange="previewImage(this, 'outPostPicArea', 'cameraIcon')">
        </div>
        <div class="control-group">
            <label>내용 (캡션)</label>
            <textarea id="inputCaption" rows="4" oninput="updateFeedText()">**#SNS_피드_생성기** 자유롭게 사용해주세요.ᐟ</textarea>
        </div>
        <div class="control-group">
            <label>댓글 추가</label>
            <div class="comment-input-group">
                <input type="text" id="inputCommentName" value="사용자">
                <input type="text" id="inputCommentText" placeholder="댓글 내용 입력..." onkeypress="if(event.key === 'Enter') addComment()">
            </div>
            <div class="comment-input-group">
                <button class="add-comment-btn" onclick="addComment()"><i class="fa-solid fa-plus"></i> 댓글 추가</button>
            </div>
            <div id="commentListControl" class="comment-list-control"></div>
        </div>

        <div class="action-buttons">
            <button class="action-btn capture-btn" onclick="captureImage()"><i class="fa-solid fa-download"></i> 다운로드</button>
            <button class="action-btn copy-btn" onclick="copyImage()"><i class="fa-solid fa-copy"></i> 복사하기</button>
            <button class="action-btn share-btn" onclick="shareImage()"><i class="fa-solid fa-share-nodes"></i> 공유하기</button>
        </div>
    </div>

    <div class="capture-container" id="captureContainer">
        <div class="feed-card" id="captureArea">
            <div class="card-header">
                <div class="user-info">
                    <div class="user-avatar" id="outProfilePicArea">
                        <div class="avatar-placeholder" id="profilePlaceholder"><i class="fa-solid fa-circle-user"></i></div>
                    </div>
                    <span class="username-display editable" id="outUsername" contenteditable="true" spellcheck="false" 
                          onkeydown="if(event.key==='Enter'){event.preventDefault(); this.blur();}" 
                          onblur="syncUserInline(this.innerText, true)">WHOU_Design</span>
                </div>
                <i class="fa-solid fa-ellipsis"></i>
            </div>
            <div class="post-image-container" id="outPostPicArea">
                <i class="fa-solid fa-camera" id="cameraIcon"></i>
            </div>
            <div class="post-actions">
                <div class="left">
                    <i class="fa-regular fa-heart"></i>
                    <i class="fa-regular fa-comment"></i>
                    <i class="fa-regular fa-paper-plane"></i>
                </div>
                <div><i class="fa-regular fa-bookmark"></i></div>
            </div>
            <div class="post-content">
                <div class="post-caption">
                    <strong id="outCaptionUser" class="editable" contenteditable="true" spellcheck="false" 
                            onkeydown="if(event.key==='Enter'){event.preventDefault(); this.blur();}" 
                            onblur="syncUserInline(this.innerText, false)">WHOU_Design</strong>
                    <span id="outCaptionText" class="caption-text editable" contenteditable="true" spellcheck="false" 
                          onfocus="focusCaption(this)" 
                          onblur="blurCaption(this)"></span>
                </div>
                <div id="viewCommentsBtn" class="view-comments-btn" onclick="toggleComments()">모든 댓글 보기</div>
                <div id="outComments" class="comments-section"></div>
            </div>
        </div>
    </div>
</div>

<script>
    let comments = []; 
    let oriWidth, oriHeight;

    document.addEventListener('DOMContentLoaded', () => {
        oriWidth = document.getElementById('captureArea').offsetWidth;
        renderComments(); 
        resizeCard(); 
        updateFeedText();
    });

    window.addEventListener('resize', resizeCard);

    /* --- 인라인 수정 동기화 함수들 --- */
    function syncUserInline(val, isHeader) {
        document.getElementById('inputUsername').value = val;
        if (isHeader) {
            document.getElementById('outCaptionUser').innerText = val;
        } else {
            document.getElementById('outUsername').innerText = val;
        }
    }

    function focusCaption(el) {
        el.innerText = document.getElementById('inputCaption').value;
    }

    function blurCaption(el) {
        document.getElementById('inputCaption').value = el.innerText;
        el.innerHTML = formatText(el.innerText);
        updateHeightAndResize();
    }

    function focusCmtText(el, id) {
        const c = comments.find(x => x.id === id);
        if (c) el.innerText = c.text; 
    }

    // 댓글 데이터를 양방향(왼/오)으로 일괄 동기화하는 함수
    function syncCommentData(id, field, value) {
        const comment = comments.find(c => c.id === id);
        if (comment) {
            comment[field] = value;
            renderComments(); // 오른쪽 미리보기 갱신
            renderCommentControl(); // 왼쪽 컨트롤패널 갱신
            updateHeightAndResize();
        }
    }
    /* ------------------------------ */

    function updateFeedText() {
        const username = document.getElementById('inputUsername').value || 'WHOU_Design';
        const caption = document.getElementById('inputCaption').value;

        if(document.activeElement.id !== 'outUsername' && document.activeElement.id !== 'outCaptionUser') {
            document.getElementById('outUsername').innerText = username;
            document.getElementById('outCaptionUser').innerText = username;
        }
        if(document.activeElement.id !== 'outCaptionText') {
            document.getElementById('outCaptionText').innerHTML = formatText(caption);
        }

        updateHeightAndResize();
    }
    
    function formatText(text) {
        if (!text) return "";
        let formatted = text.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
        return formatted.replace(/(\#[^\s!@#$%^&*()+\-=\[\]{};':"\\|,.<>\/?]+)/g, '<span class="hashtag">$1</span>');
    }

    function previewImage(input, targetAreaId, iconId) {
        const targetArea = document.getElementById(targetAreaId);
        const icon = document.getElementById(iconId);
        
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                targetArea.style.backgroundImage = `url(${e.target.result})`;
                if (icon) icon.style.display = 'none';
                updateHeightAndResize();
            }
            reader.readAsDataURL(input.files[0]);
        } else {
            targetArea.style.backgroundImage = 'none';
            if (icon) icon.style.display = ''; 
            updateHeightAndResize();
        }
    }

    function resizeCard() {
        const cw = document.querySelector('.main-container').offsetWidth;
        const area = document.getElementById('captureArea');
        const container = document.getElementById('captureContainer');

        if (!oriWidth || !oriHeight) return;

        if (cw < 420) {
            const scale = (cw - 40) / oriWidth;
            area.style.transform = `scale(${scale})`;
            container.style.height = `${oriHeight * scale}px`;
        } else {
            area.style.transform = `scale(1)`;
            container.style.height = 'auto';
        }
    }

    function updateHeightAndResize() {
        setTimeout(() => {
            oriHeight = document.getElementById('captureArea').offsetHeight;
            resizeCard();
        }, 50);
    }

    function addComment() {
        const name = document.getElementById('inputCommentName').value || '사용자';
        const text = document.getElementById('inputCommentText').value;

        if (!text) return alert('댓글 내용을 입력해 주세요.');

        comments.push({ id: Date.now(), name, text });
        renderComments(); 
        renderCommentControl(); 
        document.getElementById('inputCommentText').value = ''; 
        updateHeightAndResize();
    }

    function removeComment(id) {
        comments = comments.filter(c => c.id !== id);
        renderComments();
        renderCommentControl();
        updateHeightAndResize();
    }

    function renderComments() {
        const out = document.getElementById('outComments');
        const btn = document.getElementById('viewCommentsBtn');
        out.innerHTML = ''; 

        if (comments.length === 0) { btn.style.display = 'none'; return; }
        
        btn.style.display = comments.length > 2 ? 'block' : 'none'; 
        btn.innerText = `모든 댓글 보기 (${comments.length}개)`;

        const visible = comments.length > 2 ? comments.slice(-2) : comments;
        visible.forEach(c => {
            out.insertAdjacentHTML('beforeend', `
                <div class="comment-item">
                    <div>
                        <strong class="editable" contenteditable="true" spellcheck="false" 
                                onkeydown="if(event.key==='Enter'){event.preventDefault(); this.blur();}" 
                                onblur="syncCommentData(${c.id}, 'name', this.innerText)">${c.name}</strong>
                        <span class="comment-text editable" contenteditable="true" spellcheck="false" 
                              onfocus="focusCmtText(this, ${c.id})" 
                              onblur="syncCommentData(${c.id}, 'text', this.innerText)">${formatText(c.text)}</span>
                    </div>
                    <i class="fa-regular fa-heart"></i>
                </div>
            `);
        });
        oriHeight = document.getElementById('captureArea').offsetHeight;
    }

    function renderCommentControl() {
        const list = document.getElementById('commentListControl');
        list.innerHTML = '';
        comments.forEach(c => {
            list.insertAdjacentHTML('beforeend', `
                <div class="comment-control-item">
                    <div class="cmt-text-area">
                        <strong class="editable" contenteditable="true" spellcheck="false" 
                                onkeydown="if(event.key==='Enter'){event.preventDefault(); this.blur();}" 
                                onblur="syncCommentData(${c.id}, 'name', this.innerText)">${c.name}</strong>: 
                        <span class="editable" contenteditable="true" spellcheck="false" 
                              onkeydown="if(event.key==='Enter'){event.preventDefault(); this.blur();}" 
                              onblur="syncCommentData(${c.id}, 'text', this.innerText)">${c.text}</span>
                    </div>
                    <div>
                        <button class="del-btn" onclick="removeComment(${c.id})"><i class="fa-solid fa-trash-can"></i></button>
                    </div>
                </div>
            `);
        });
    }

    function toggleComments() {
        const out = document.getElementById('outComments');
        document.getElementById('viewCommentsBtn').style.display = 'none'; 
        out.innerHTML = '';
        comments.forEach(c => {
            out.insertAdjacentHTML('beforeend', `
                <div class="comment-item">
                    <div>
                        <strong class="editable" contenteditable="true" spellcheck="false" 
                                onkeydown="if(event.key==='Enter'){event.preventDefault(); this.blur();}" 
                                onblur="syncCommentData(${c.id}, 'name', this.innerText)">${c.name}</strong>
                        <span class="comment-text editable" contenteditable="true" spellcheck="false" 
                              onfocus="focusCmtText(this, ${c.id})" 
                              onblur="syncCommentData(${c.id}, 'text', this.innerText)">${formatText(c.text)}</span>
                    </div>
                    <i class="fa-regular fa-heart"></i>
                </div>
            `);
        });
        updateHeightAndResize();
    }

    async function generateCanvas() {
        const area = document.getElementById('captureArea');
        const container = document.getElementById('captureContainer');
        const originalStyle = area.getAttribute('style') || '';
        const originalContainerHeight = container.style.height;
        
        container.style.height = `${container.offsetHeight}px`;
        
        area.style.setProperty('transform', 'scale(1)', 'important');
        area.style.setProperty('position', 'fixed', 'important');
        area.style.setProperty('top', '0', 'important');
        area.style.setProperty('left', '0', 'important');
        area.style.setProperty('z-index', '9999', 'important');
        area.style.setProperty('margin', '0', 'important');
        area.style.setProperty('box-shadow', 'none', 'important');
        area.style.setProperty('border', 'none', 'important');
        area.style.setProperty('border-radius', '0', 'important');
        
        // 캡쳐 시 editable 점선/배경 효과 제거
        const editables = document.querySelectorAll('.editable');
        editables.forEach(el => { el.style.border = 'none'; el.style.background = 'transparent'; el.style.boxShadow = 'none'; });
        
        await new Promise(r => setTimeout(r, 200)); 
        
        const canvas = await html2canvas(area, {
            scale: 3, 
            backgroundColor: '#ffffff', 
            useCORS: true,
            logging: false
        });
        
        area.setAttribute('style', originalStyle);
        container.style.height = originalContainerHeight;
        editables.forEach(el => { el.style = ''; }); // 스타일 원상복구
        
        return canvas;
    }

    function captureImage() {
        generateCanvas().then(canvas => {
            const link = document.createElement('a');
            link.href = canvas.toDataURL('image/png');
            link.download = `sns_feed_${Date.now()}.png`;
            link.click();
        });
    }

    function copyImage() {
        generateCanvas().then(canvas => {
            canvas.toBlob(blob => {
                navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })])
                    .then(() => alert('클립보드에 복사되었습니다.'))
                    .catch(() => alert('복사에 실패했습니다. 권한을 확인해주세요.'));
            });
        });
    }

    function shareImage() {
        generateCanvas().then(canvas => {
            canvas.toBlob(blob => {
                const file = new File([blob], `sns_feed.png`, { type: 'image/png' });
                if (navigator.share) {
                    navigator.share({ title: '내 SNS 피드', files: [file] }).catch(console.error);
                } else {
                    alert('공유하기를 지원하지 않는 브라우저입니다.');
                }
            });
        });
    }
</script>
</body>
</html>
